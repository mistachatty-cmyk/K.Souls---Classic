kind = "web"
previewPath = "/"
title = "Kinetic Souls"
version = "1.0.0"
id = "artifacts/kinetic-souls"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24362

[services.development]
run = "pnpm --filter @workspace/kinetic-souls run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kinetic-souls", "run", "build" ]
publicDir = "artifacts/kinetic-souls/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24362"
BASE_PATH = "/"
